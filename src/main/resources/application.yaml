# ============================================================
#  application.yml  ?  Base / Common Configuration
#  Profile-specific files override values defined here.
#  Active profile is chosen via:
#    - ENV variable : SPRING_PROFILES_ACTIVE=dev|prod|test
#    - JVM arg      : -Dspring.profiles.active=dev
#    - Maven        : -Pdev  (with plugin config)
# ============================================================

# ----- Server -------------------------------------------------
server:
  port: 8000
  servlet:
    context-path: /api
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/plain
    min-response-size: 1024
  error:
    include-message: never             # overridden in dev
    include-binding-errors: never
    include-stacktrace: never

spring:
  application:
    name: "SBT Application Server"

  # ----- Profile -----------------------------------------------
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}   # fallback to dev locally

  # ----- Datasource (overridden per profile) -------------------
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: CrmHikariPool
      minimum-idle: 2
      maximum-pool-size: 10
      connection-timeout: 30000        # ms
      idle-timeout: 600000
      max-lifetime: 1800000
      auto-commit: false

  # ----- Redis -------------------------------------------------
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      username: ${REDIS_USERNAME}
      password: ${REDIS_PASSWORD}
      database: ${REDIS_DATABASE:0}
      timeout: ${REDIS_TIMEOUT:2000ms}
      lettuce:
        pool:
          max-active: 8
          max-idle: 4
          min-idle: 2

  # ----- JPA ---------------------------------------------------
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        use_sql_comments: false
        jdbc:
          batch_size: 25
          order_inserts: true
          order_updates: true

  # ----- Flyway ------------------------------------------------
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true
    out-of-order: false

  # ----- Kafka (overridden per profile) ------------------------
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 1
    consumer:
      group-id: ${spring.application.name}
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      auto-offset-reset: earliest
      enable-auto-commit: false
      properties:
        spring.json.trusted.packages: "com.crm.server.*"
    listener:
      ack-mode: MANUAL_IMMEDIATE
      concurrency: 3

  # ----- Mail (overridden per profile) -------------------------
  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
    default-encoding: UTF-8

  # ----- Thymeleaf ---------------------------------------------
  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    encoding: UTF-8
    mode: HTML
    cache: true                       # overridden to false in dev

  # ----- Security ----------------------------------------------
  security:
    require-ssl: false                # overridden to true in prod

  # ----- WebSocket ---------------------------------------------
  websocket:
    path: /ws
    allowed-origins: ${WS_ALLOWED_ORIGINS:*}

# ----- Actuator -----------------------------------------------
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,flyway
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      show-components: when-authorized
  info:
    env:
      enabled: true

# ----- SpringDoc / Swagger ------------------------------------
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    try-it-out-enabled: true
    operations-sorter: alpha
    tags-sorter: alpha
  show-actuator: false
  packages-to-scan: com.crm.server

# ----- Application-level custom properties --------------------
app:
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiry-ms: 900000          # 15 min
    refresh-token-expiry-ms: 604800000      # 7 days
    issuer: crm-server
  mail:
    from: ${MAIL_FROM:no-reply@crm.com}
    base-url: ${APP_BASE_URL}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
    allowed-methods: GET,POST,PUT,PATCH,DELETE,OPTIONS
    allowed-headers: "*"
    allow-credentials: true
    max-age: 3600
